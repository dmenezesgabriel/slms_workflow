repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: uv run isort --check-only --diff
        language: system
        types_or: [python, pyi]

      - id: black
        name: black
        entry: uv run black --check --diff
        language: system
        types_or: [python, pyi]

      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types_or: [python, pyi]
